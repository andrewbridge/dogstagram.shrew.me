<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA Test — Dogstagram</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: monospace; font-size: 13px; padding: 16px; background: #1a1a1a; color: #e0e0e0; }
      h1 { font-size: 16px; margin-bottom: 16px; color: #a0d0ff; }
      label { display: block; margin-bottom: 4px; color: #a0a0a0; }
      input { width: 400px; padding: 6px 8px; background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; border-radius: 3px; margin-bottom: 12px; }
      button { padding: 8px 16px; background: #2a5a2a; border: 1px solid #4a8a4a; color: #c0ffc0; border-radius: 3px; cursor: pointer; margin-right: 8px; }
      button:hover { background: #3a6a3a; }
      .status { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 11px; margin-left: 8px; }
      .connected { background: #1a4a1a; color: #80ff80; border: 1px solid #40a040; }
      .disconnected { background: #4a1a1a; color: #ff8080; border: 1px solid #a04040; }
      .error { background: #4a2a00; color: #ffb060; border: 1px solid #a06020; margin-top: 8px; padding: 6px 10px; border-radius: 3px; }
      section { margin-top: 24px; }
      h2 { font-size: 13px; color: #a0d0ff; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 4px; }
      table { width: 100%; border-collapse: collapse; }
      th { text-align: left; padding: 6px 8px; color: #808080; font-weight: normal; border-bottom: 1px solid #333; }
      td { padding: 5px 8px; border-bottom: 1px solid #2a2a2a; vertical-align: top; }
      tr.highlight td { background: #1a3a1a; transition: background 2s; }
      .ok { color: #60c060; }
      .problem { color: #e06060; }
      .unknown { color: #808080; }
      pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://unpkg.com/vue@3.2.37/dist/vue.esm-browser.prod.js",
          "goober": "https://unpkg.com/goober@2.1.10/dist/goober.esm.js",
          "route-parser": "https://cdn.skypack.dev/route-parser",
          "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.esm.js",
          "howler": "https://esm.sh/howler"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="ha-test.mjs" type="module"></script>
  </body>
</html>
